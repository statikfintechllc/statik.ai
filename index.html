<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Statik.ai</title>
    <link rel="stylesheet" href="assets/styles/base.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <div id="root">
        <header>
            <h1>Statik.ai</h1>
            <div id="status-indicator" style="color: yellow; font-size: 0.8rem;">BOOTING...</div>
        </header>
        <main>
            <div id="boot-log" style="font-family: monospace; font-size: 12px; white-space: pre-wrap;"></div>
        </main>
    </div>

    <!-- Redirect console to UI for visualization during boot -->
    <script>
        const logEl = document.getElementById('boot-log');
        const statusEl = document.getElementById('status-indicator');
        
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            const line = document.createElement('div');
            line.textContent = '> ' + args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ');
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
        };

        const originalError = console.error;
        console.error = function(...args) {
            originalError.apply(console, args);
            const line = document.createElement('div');
            line.textContent = 'ERROR: ' + args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ');
            line.style.color = 'red';
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
        };
        
        // Listen for system ready roughly
        // In a real app we'd use the event bus, but here we can just watch for the log or wait
        // The UI unit will also log to console
    </script>

    <script type="module">
        import { boot } from './bootstrap/boot.js';
        
        // Start system
        boot().then(() => {
            document.getElementById('status-indicator').textContent = 'SYSTEM READY';
            document.getElementById('status-indicator').style.color = '#58a6ff';
        });
    </script>
</body>
</html>
